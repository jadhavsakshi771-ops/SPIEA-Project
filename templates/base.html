<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SPIEA Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
margin:0;
}

.navbar{
background:#020617;
padding:15px 40px;
}

.navbar-brand{
font-weight:600;
font-size:22px;
}

.hero{
min-height:80vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.card-ui{
background:#1e293b;
border-radius:14px;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.btn-main{
background:#3b82f6;
border:none;
padding:10px 22px;
border-radius:8px;
}

.btn-main:hover{
background:#2563eb;
}

input{
background:#020617 !important;
border:1px solid #334155 !important;
color:white !important;
}

.section{
padding:70px 0;
}

.footer{
background:#020617;
padding:20px;
text-align:center;
color:#94a3b8;
margin-top:50px;
}

.card-ui{
background:linear-gradient(145deg,#1e293b,#0f172a);
border:1px solid #334155;
border-radius:14px;
padding:30px;
box-shadow:0 0 20px rgba(59,130,246,0.3);
}

canvas{
max-width:100%;
margin:auto;
}

.card-ui{
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

body{
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
font-family: 'Segoe UI', sans-serif;
}

.card-ui{
background: rgba(255,255,255,0.08);
border-radius:15px;
padding:20px;
margin-bottom:20px;
backdrop-filter: blur(10px);
box-shadow:0 8px 25px rgba(0,0,0,0.4);
transition: transform 0.2s ease;
}

.card-ui:hover{
transform: translateY(-3px);
}

table{
border-radius:10px;
overflow:hidden;
}

h2,h4,h5{
font-weight:600;
}

canvas{
max-width:100%;
margin:auto;
}

.btn-primary{
background:#6366f1;
border:none;
}

.btn-primary:hover{
background:#4f46e5;
}

.form-control{
background:rgba(255,255,255,0.1);
border:none;
color:white;
}

.form-control::placeholder{
color:#cbd5f5;
}

.table{
color:white;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">SPIEA</a>

<div>

<a class="btn btn-outline-light me-2" href="/features">Features</a>
<a class="btn btn-outline-light me-2" href="/about">About</a>
<a class="btn btn-outline-light me-2" href="/contact">Contact</a>
<a class="btn btn-main" href="/login">Login</a>

</div>

</div>

</nav>

<div class="container section">

{% block content %}

{% endblock %}

</div>

<div class="footer">
SPIEA © 2026 | Student Placement Intelligence Platform
</div>

</body>
</html>
